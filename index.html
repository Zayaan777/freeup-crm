<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FreeUp AI Agency — CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          navy: { 900: '#0B1120', 800: '#111827', 700: '#1A2236' },
          accent: { DEFAULT: '#2563EB', light: '#3B82F6' },
          teal: { DEFAULT: '#14B8A6' },
        }
      }
    }
  }
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.10.4/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Inter', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn .25s ease-out; }
</style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script src="./supabase-client.js"></script>
  <script src="./data.js"></script>
  <script>
    fetch('./app.js')
      .then(r => r.text())
      .then(code => {
        const out = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] }).code;
        (0, eval)(out);
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<pre style="color:red;padding:2rem;">' + err.message + '</pre>';
      });
  </script>
</body>
</html>
